<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <title>Trabajo de Refactorización - Zoom de Texto</title>
</head>
<body>
  <h1>Control de Zoom de Texto</h1>
  <p id="descripcion">Este es un texto que puedes aumentar o disminuir de tamaño</p>
  <div class="botones">
    <button id="btnAumentar">+</button>
    <button id="btnDisminuir">-</button>
    <button id="btnReiniciar">🏠</button>
  </div>
  <p id="tamaño">Tamaño actual: 18px</p>
</body>
</html>
